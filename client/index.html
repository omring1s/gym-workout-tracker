<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Professional Gym Workout Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Professional Gym Workout Tracker</h1>

    <div class="card">
        <label for="bodyPart">Body Part</label>
        <select id="bodyPart">
            <option value="">Select Body Part</option>
            <option value="Chest">Chest</option>
            <option value="Back">Back</option>
            <option value="Legs">Legs</option>
            <option value="Shoulders">Shoulders</option>
            <option value="Arms">Arms</option>
            <option value="Core">Core</option>
        </select>

        <label for="exercise">Exercise</label>
        <select id="exercise">
            <option value="">Select Exercise</option>
        </select>

        <label for="sets">Sets</label>
        <input id="sets" type="number" placeholder="Sets">

        <label for="reps">Reps</label>
        <input id="reps" type="number" placeholder="Reps">

        <label for="weight">Weight (lbs)</label>
        <input id="weight" type="number" placeholder="Weight">

        <label for="notes">Notes</label>
        <input id="notes" placeholder="Optional notes">

        <button onclick="addWorkout()">Add Workout</button>
    </div>

    <div class="filters card">
        <h3>Filters</h3>
        <select id="filterBodyPart">
            <option value="">All Body Parts</option>
            <option value="Chest">Chest</option>
            <option value="Back">Back</option>
            <option value="Legs">Legs</option>
            <option value="Shoulders">Shoulders</option>
            <option value="Arms">Arms</option>
            <option value="Core">Core</option>
        </select>

        <select id="filterExercise">
            <option value="">All Exercises</option>
        </select>

        <button onclick="applyFilters()">Apply Filters</button>
        <button onclick="clearFilters()">Clear Filters</button>
    </div>

    <div class="chart-card">
        <canvas id="chart"></canvas>
    </div>

    <div id="workout-list" class="workout-list"></div>

    <script src="script.js"></script>
</body>
</html>
